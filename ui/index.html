<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orchestration 1.0 Workflow Control</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="office-sidebar" aria-label="워크플로우 사이드바">
        <section class="office-brand-card">
          <p class="office-brand-kicker">Orchestration 1.0</p>
          <h1>Orchestration</h1>
          <p class="office-brand-subcopy">Workflow Control</p>
          <div class="office-brand-register" aria-label="회사 등록 정보">
            <div class="office-register-cell">
              <span class="office-register-label">Mode</span>
              <strong class="office-register-value">single operator</strong>
            </div>
            <div class="office-register-cell">
              <span class="office-register-label">Pack</span>
              <strong class="office-register-value">development</strong>
            </div>
            <div class="office-register-cell">
              <span class="office-register-label">Ops</span>
              <strong class="office-register-value">advanced</strong>
            </div>
          </div>
        </section>

        <section class="office-sidebar-section office-sidebar-section-status">
          <div class="office-sidebar-head">
            <p class="office-sidebar-label">회사 디렉터리</p>
            <span class="office-sidebar-chip office-sidebar-chip-live">live</span>
          </div>
          <div class="office-sidebar-status-register" aria-label="회사 디렉터리 상태">
            <div class="office-sidebar-status-cell">
              <span class="office-register-label">현재 프로젝트</span>
              <strong id="office-sidebar-project" class="office-sidebar-status-value">미지정</strong>
            </div>
            <div class="office-sidebar-status-cell">
              <span class="office-register-label">현재 데스크</span>
              <strong id="office-sidebar-surface" class="office-sidebar-status-value">미션</strong>
            </div>
            <div class="office-sidebar-status-cell">
              <span class="office-register-label">열린 실행</span>
              <strong id="office-sidebar-runs" class="office-sidebar-status-value">0건</strong>
            </div>
            <div class="office-sidebar-status-cell">
              <span class="office-register-label">열린 승인선</span>
              <strong id="office-sidebar-gates" class="office-sidebar-status-value">0건</strong>
            </div>
          </div>
          <div id="company-directory-summary" class="company-directory-summary" aria-label="회사 인력 요약"></div>
          <div id="company-directory-shell" class="company-directory-shell" aria-label="회사 인력 명부"></div>
        </section>

        <nav class="primary-nav office-sidebar-nav" aria-label="주요 표면">
          <div class="nav-group-tabs" role="tablist" aria-label="주요 메뉴 그룹">
            <button
              class="nav-group-tab is-active"
              data-nav-group-tab="workflows"
              type="button"
              role="tab"
              aria-selected="true"
            >
              업무
            </button>
            <button
              class="nav-group-tab"
              data-nav-group-tab="review"
              type="button"
              role="tab"
              aria-selected="false"
            >
              검토
            </button>
            <button
              class="nav-group-tab"
              data-nav-group-tab="ops"
              type="button"
              role="tab"
              aria-selected="false"
            >
              운영
            </button>
          </div>
          <div class="nav-group" data-nav-group="workflows">
            <div class="nav-button-row">
              <button class="nav-button is-active" data-surface="mission" type="button">미션</button>
              <button class="nav-button" data-surface="council" type="button">협의회</button>
              <button class="nav-button" data-surface="execution" type="button">실행</button>
              <button class="nav-button" data-surface="deliverables" type="button">산출물</button>
            </div>
          </div>
          <div class="nav-group" data-nav-group="review" hidden>
            <div class="nav-button-row">
              <button class="nav-button" data-surface="decision-inbox" type="button">결정함</button>
              <button class="nav-button" data-surface="artifacts" type="button">아티팩트</button>
              <button class="nav-button" data-surface="logs" type="button">로그</button>
            </div>
          </div>
          <div class="nav-group" data-nav-group="ops" hidden>
            <div class="nav-button-row">
              <button class="nav-button" data-surface="taskboard" type="button">작업판</button>
            </div>
          </div>
        </nav>

      </aside>

      <div class="workspace-shell">
        <header class="shell-header">
          <div class="shell-window-bar">
            <div class="shell-window-meta shell-window-meta-left">
              <span id="shell-window-label" class="shell-window-label">WORK</span>
            </div>
            <div class="shell-window-runtime">
              <span id="refresh-status" class="refresh-status">연결 중…</span>
              <button id="refresh-button" class="refresh-button" type="button">새로고침</button>
            </div>
          </div>

          <div class="shell-header-main">
            <div class="shell-intro">
              <div class="shell-headline-stack">
                <p id="shell-header-eyebrow" class="eyebrow">Workflow desk</p>
                <h2 id="shell-dashboard-title" class="shell-dashboard-title">업무</h2>
              </div>
              <div class="shell-header-register" aria-label="현재 workspace 요약">
                <div class="shell-header-register-cell">
                  <span class="shell-header-register-label">현재 프로젝트</span>
                  <strong id="shell-header-project" class="shell-header-register-value">미지정</strong>
                </div>
                <div class="shell-header-register-cell">
                  <span class="shell-header-register-label">현재 workspace</span>
                  <strong id="shell-header-surface" class="shell-header-register-value">업무</strong>
                </div>
                <div class="shell-header-register-cell">
                  <span class="shell-header-register-label">열린 승인선</span>
                  <strong id="shell-header-gates" class="shell-header-register-value">0건</strong>
                </div>
              </div>
            </div>
          </div>
        </header>

        <section id="control-overview" class="control-overview" aria-label="현재 운영 개요"></section>

        <main class="surface-stack">
          <section id="surface-mission" class="surface is-active" data-surface="mission" aria-label="미션"></section>
          <section id="surface-council" class="surface" data-surface="council" aria-label="협의회"></section>
          <section id="surface-execution" class="surface" data-surface="execution" aria-label="실행"></section>
          <section id="surface-deliverables" class="surface" data-surface="deliverables" aria-label="산출물"></section>
          <section id="surface-taskboard" class="surface" data-surface="taskboard" aria-label="작업판"></section>
          <section id="surface-logs" class="surface" data-surface="logs" aria-label="로그"></section>
          <section id="surface-artifacts" class="surface" data-surface="artifacts" aria-label="아티팩트"></section>
          <section id="surface-decision-inbox" class="surface" data-surface="decision-inbox" aria-label="결정함"></section>
        </main>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
